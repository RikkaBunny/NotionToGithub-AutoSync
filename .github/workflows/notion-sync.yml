name: Notion Sync

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      filter_status:
        description: "Status values to sync (comma-separated)"
        required: false
        default: "Done"
      incremental:
        description: "Skip pages whose updatedAt is unchanged"
        required: false
        default: "true"

permissions:
  contents: write
  issues: write

# Prevent overlapping runs (manual + cron collision)
concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Sync from Notion
        env:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          NOTION_DATABASE: ${{ secrets.NOTION_DATABASE }}
          FILTER_STATUS: ${{ github.event.inputs.filter_status || 'Done' }}
          ARTICLE_DIR: "articles"
          ASSETS_DIR: "assets"
          INCREMENTAL: ${{ github.event.inputs.incremental || 'true' }}
          FETCH_TIMEOUT_MS: "30000"
          MAX_RETRIES: "3"
          PRUNE_ASSETS: "true"
        run: node scripts/sync.mjs

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync from Notion"
          file_pattern: "articles assets"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Notion Sync failed · run #${context.runNumber}`;
            const body = [
              `The scheduled Notion sync workflow failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              `- Triggered by: ${context.eventName}`,
              ``,
              `Check the logs for details.`,
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "sync-failed",
              state: "open",
            });
            if (open.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["sync-failed"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            }
